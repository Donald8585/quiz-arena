services:
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [backend1]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 32m

  backend1:
    build: ./backend
    environment:
      - INSTANCE_ID=backend1
      - SERVER_ROLE=app-server
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=${DATABASE_URL:-postgresql://quizuser:quizpass@postgres:5432/quizdb}
      - LAMBDA_URL=${LAMBDA_URL:-http://localhost:9000}
    ports: ["8000:8000"]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 128m

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [nginx]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 256m

networks:
  quiznet:
    driver: bridge
