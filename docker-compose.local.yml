# LOCAL DEV: all 12 containers (needs 4GB+ RAM)
services:
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [backend1, backend2, backend3]
    networks: [quiznet]

  backend1:
    build: ./backend
    environment: [INSTANCE_ID=backend1, REDIS_URL=redis://redis:6379, DATABASE_URL=postgresql://quizuser:quizpass@postgres:5432/quizdb, LAMBDA_URL=http://lambda-mock:9000]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [quiznet]

  backend2:
    build: ./backend
    environment: [INSTANCE_ID=backend2, REDIS_URL=redis://redis:6379, DATABASE_URL=postgresql://quizuser:quizpass@postgres:5432/quizdb, LAMBDA_URL=http://lambda-mock:9000]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [quiznet]

  backend3:
    build: ./backend
    environment: [INSTANCE_ID=backend3, REDIS_URL=redis://redis:6379, DATABASE_URL=postgresql://quizuser:quizpass@postgres:5432/quizdb, LAMBDA_URL=http://lambda-mock:9000]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [quiznet]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 5 }
    networks: [quiznet]

  postgres:
    image: postgres:16-alpine
    environment: [POSTGRES_USER=quizuser, POSTGRES_PASSWORD=quizpass, POSTGRES_DB=quizdb]
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U quizuser -d quizdb"], interval: 5s, timeout: 3s, retries: 10 }
    networks: [quiznet]

  lambda-mock:
    build: ./lambda
    ports: ["9000:9000"]
    networks: [quiznet]

  loki:
    image: grafana/loki:2.9.0
    ports: ["3100:3100"]
    volumes: ["./loki/loki-config.yml:/etc/loki/local-config.yaml:ro"]
    command: -config.file=/etc/loki/local-config.yaml
    networks: [quiznet]

  promtail:
    image: grafana/promtail:2.9.0
    volumes: ["/var/log:/var/log:ro", "/var/lib/docker/containers:/var/lib/docker/containers:ro", "/var/run/docker.sock:/var/run/docker.sock:ro", "./loki/promtail-config.yml:/etc/promtail/config.yml:ro"]
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]
    networks: [quiznet]

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes: ["./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    networks: [quiznet]

  grafana:
    image: grafana/grafana:latest
    ports: ["3001:3000"]
    environment: [GF_SECURITY_ADMIN_PASSWORD=admin]
    volumes: ["./grafana/provisioning:/etc/grafana/provisioning"]
    depends_on: [prometheus, loki]
    networks: [quiznet]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [nginx]
    networks: [quiznet]

volumes:
  pgdata:
networks:
  quiznet:
    driver: bridge
