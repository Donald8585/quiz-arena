services:
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [backend1, backend2]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 32m

  backend1:
    build: ./backend
    environment:
      - INSTANCE_ID=backend1
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=${DATABASE_URL:-postgresql://quizuser:quizpass@postgres:5432/quizdb}
      - LAMBDA_URL=http://lambda-mock:9000
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 128m

  backend2:
    build: ./backend
    environment:
      - INSTANCE_ID=backend2
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=${DATABASE_URL:-postgresql://quizuser:quizpass@postgres:5432/quizdb}
      - LAMBDA_URL=http://lambda-mock:9000
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 128m

  lambda-mock:
    build: ./lambda
    ports: ["9000:9000"]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 64m

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes: ["./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 128m

  grafana:
    image: grafana/grafana:latest
    ports: ["3001:3000"]
    environment: [GF_SECURITY_ADMIN_PASSWORD=admin]
    volumes: ["./grafana/provisioning:/etc/grafana/provisioning"]
    depends_on: [prometheus]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 128m

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [nginx]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 256m

networks:
  quiznet:
    driver: bridge
