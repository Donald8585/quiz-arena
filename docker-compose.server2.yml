services:
  backend2:
    build: ./backend
    environment:
      - INSTANCE_ID=backend2
      - SERVER_ROLE=worker-server
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=${DATABASE_URL:-postgresql://quizuser:quizpass@postgres:5432/quizdb}
      - LAMBDA_URL=${LAMBDA_URL:-http://localhost:9000}
    ports: ["8000:8000"]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 128m

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes: ["./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 128m

  grafana:
    image: grafana/grafana:latest
    ports: ["3001:3000"]
    environment: ["GF_SECURITY_ADMIN_PASSWORD=admin"]
    volumes: ["./grafana/provisioning:/etc/grafana/provisioning"]
    depends_on: [prometheus]
    networks: [quiznet]
    restart: unless-stopped
    mem_limit: 128m

networks:
  quiznet:
    driver: bridge
