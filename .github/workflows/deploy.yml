name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - run: docker build -t ghcr.io/${{ github.repository }}/backend:latest ./backend && docker push ghcr.io/${{ github.repository }}/backend:latest
      - run: docker build -t ghcr.io/${{ github.repository }}/frontend:latest ./frontend && docker push ghcr.io/${{ github.repository }}/frontend:latest
      - run: docker build -t ghcr.io/${{ github.repository }}/lambda:latest ./lambda && docker push ghcr.io/${{ github.repository }}/lambda:latest
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: cd ~/quiz-arena && git pull origin main && sudo docker compose pull && sudo docker compose up --build -d && sudo docker image prune -f
